<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="{% if session.get('dark_mode') %}dark-mode{% endif %}">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('dashboard') }}">Habit Tracker</a>
      <div class="navbar-nav">
        <a class="nav-link" href="{{ url_for('landing') }}">Home</a>
        <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
        <a class="nav-link" href="{{ url_for('habits') }}">Habits</a>
        <a class="nav-link" href="{{ url_for('analytics') }}">Analytics</a>
        <a class="nav-link" href="{{ url_for('profile') }}">Profile</a>
        <a class="nav-link" href="{{ url_for('settings') }}">Settings</a>
        <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
      </div>
      <form method="POST" action="{{ url_for('toggle_dark') }}">
        <button class="btn btn-sm btn-light ms-3">🌙 Toggle Dark Mode</button>
      </form>
    </div>
  </nav>

  <div class="container mt-3">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
        <script>
          {% for message in messages %}
            {% if '|confetti' in message %}
              for (let i=0; i<50; i++) {
                let conf = document.createElement("div");
                conf.innerHTML = "🎉";
                conf.style.position = "fixed";
                conf.style.left = Math.random()*100 + "%";
                conf.style.top = Math.random()*100 + "%";
                conf.style.fontSize = "24px";
                document.body.appendChild(conf);
                setTimeout(()=>conf.remove(),2000);
              }
            {% endif %}
          {% endfor %}
        </script>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
